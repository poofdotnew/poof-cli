run:
  timeout: 3m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gosimple
    - gocritic
    - misspell
    - gofmt
    - copyloopvar

linters-settings:
  errcheck:
    check-type-assertions: true
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - ifElseChain
      - singleCaseSwitch
  misspell:
    locale: US

issues:
  exclude-rules:
    # Test files can have longer functions and less strict error checking
    - path: _test\.go
      linters:
        - errcheck
        - gocritic
  max-issues-per-linter: 50
  max-same-issues: 5
